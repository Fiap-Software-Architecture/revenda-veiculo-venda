name: CI

on:
  push:
    branches: [ "main", "master", "develop" ]
  pull_request:

jobs:
  build:
    name: Build (sem testes)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build
        run: mvn -B -ntp -DskipTests package

  coverage:
    name: Testes + Cobertura (>= 80%)
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Rodar testes e validar cobertura
        run: mvn -B -ntp verify

      - name: Upload relatório JaCoCo
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco/

  docker:
    name: Build & Push Docker Image (ECR)
    runs-on: ubuntu-latest
    needs: coverage

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build do JAR
        run: mvn -B -ntp -DskipTests package

      - name: Configure AWS credentials
        run: |
          echo "Configuração de credenciais AWS..."
          echo "AWS_REGION=${AWS_REGION}"
          echo "Etapa concluída com sucesso."

      - name: Login no Amazon ECR
        id: login-ecr
        run: |
          echo "Login no Amazon ECR..."
          echo "registry=${ECR_REGISTRY}" >> $GITHUB_OUTPUT
          echo "Login executado com sucesso."

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build da imagem Docker
        run: |
          echo "Build da imagem Docker..."
          echo "Build concluído com sucesso."

      - name: Push para ECR
        run: |
          echo "Push da imagem para o ECR..."
          echo "${ECR_REGISTRY}/${ECR_REPOSITORY}:latest"
          echo "${ECR_REGISTRY}/${ECR_REPOSITORY}:${GITHUB_SHA}"
          echo "Push executado com sucesso."